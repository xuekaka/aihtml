<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双人聊天房间</title>
    <style>
      :root {
        --bg-a: #f2f5fb;
        --bg-b: #e8efe5;
        --ink: #25323a;
        --muted: #60707d;
        --panel: #ffffff;
        --line: #dbe3ea;
        --mine: #caebff;
        --theirs: #ffffff;
        --accent: #2a86d1;
        --danger: #c45252;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 8%, #fff 0%, transparent 30%),
          radial-gradient(circle at 85% 12%, #fff8e5 0%, transparent 24%),
          linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .shell {
        width: min(980px, 96vw);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 14px 32px rgba(24, 42, 58, 0.16);
        overflow: hidden;
      }

      .login {
        padding: 1.2rem;
        display: grid;
        gap: 0.8rem;
      }

      .login h1 {
        margin: 0;
        font-size: clamp(1.4rem, 3vw, 2rem);
      }

      .hint {
        color: var(--muted);
        margin: 0;
      }

      .row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      input,
      button {
        font: inherit;
      }

      input {
        border: 1px solid #cfd7df;
        border-radius: 10px;
        padding: 0.56rem 0.7rem;
        min-width: 240px;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.56rem 1rem;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(140deg, #4aa2e7 0%, #2f80c6 100%);
        font-weight: 700;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .error {
        color: var(--danger);
        font-weight: 700;
        min-height: 1.2rem;
      }

      .chat {
        display: none;
        grid-template-rows: auto 1fr auto;
        height: min(84vh, 760px);
      }

      .chat.show {
        display: grid;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: #f8fbff;
        padding: 0.8rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
      }

      .topbar strong {
        font-size: 1.05rem;
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .msgs {
        padding: 0.9rem;
        overflow: auto;
        background:
          linear-gradient(180deg, #f3f8ff 0%, #f9fbfd 100%);
      }

      .msg {
        display: grid;
        gap: 0.2rem;
        margin-bottom: 0.75rem;
      }

      .msg.mine {
        justify-items: end;
      }

      .meta {
        color: var(--muted);
        font-size: 0.76rem;
      }

      .bubble {
        max-width: min(76%, 580px);
        padding: 0.5rem 0.65rem;
        border-radius: 12px;
        border: 1px solid #d5dfeb;
        background: var(--theirs);
        word-break: break-word;
        white-space: pre-wrap;
      }

      .msg.mine .bubble {
        background: var(--mine);
        border-color: #a8d8f7;
      }

      .bubble.image {
        padding: 0.28rem;
      }

      .bubble img {
        display: block;
        max-width: min(70vw, 380px);
        border-radius: 10px;
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 0.7rem;
        display: flex;
        gap: 0.6rem;
        background: #fbfdff;
      }

      .composer input {
        min-width: 0;
        flex: 1;
      }

      .mini {
        font-size: 0.86rem;
        color: var(--muted);
      }

      .back {
        color: #2f66a6;
        font-weight: 700;
        text-decoration: none;
      }

      @media (max-width: 680px) {
        .bubble {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="login" id="loginPanel">
        <h1>双人聊天房间</h1>
        <p class="hint">请输入账号登录（仅支持：白白 / 飞飞）。无密码。</p>
        <div class="row">
          <input id="accountInput" maxlength="2" placeholder="请输入账号" />
          <button class="btn" id="loginBtn">进入房间</button>
          <a class="back" href="./index.html">返回首页</a>
        </div>
        <div class="error" id="loginError"></div>
        <div class="mini">登录后会自动读取最近 100 条记录，并实时同步双方消息。</div>
      </section>

      <section class="chat" id="chatPanel">
        <header class="topbar">
          <div>
            <strong>聊天房间</strong>
            <div class="mini">账号：<span id="meText"></span></div>
          </div>
          <div class="status" id="statusText">连接中...</div>
        </header>

        <section class="msgs" id="msgs">
          <div id="historyLoader" style="text-align: center; padding: 0.6rem; display: none; color: var(--muted); font-size: 0.85rem;">
            正在加载历史消息...
          </div>
        </section>

        <footer class="composer">
          <input id="imageInput" type="file" accept="image/*" hidden />
          <button class="btn" id="imageBtn" type="button">发图片</button>
          <input id="msgInput" maxlength="500" placeholder="输入消息，按 Enter 发送" />
          <button class="btn" id="sendBtn">发送</button>
        </footer>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://hdzeqsijrntnbdqdqyai.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkemVxc2lqcm50bmJkcWRxeWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjUyMzMsImV4cCI6MjA4Nzk0MTIzM30.4Cd4h4XEdDZUvpQU6rlM08cEU8cZ5wqW3J_oYfxJVqk";

      const ALLOWED_ACCOUNTS = new Set(["白白", "飞飞"]);
      const ACCOUNT_DIR = {
        白白: "baibai",
        飞飞: "feifei",
      };
      const TABLE_NAME = "chat_messages";
      const IMAGE_BUCKET = "chat-images";

      const loginPanel = document.getElementById("loginPanel");
      const chatPanel = document.getElementById("chatPanel");
      const accountInput = document.getElementById("accountInput");
      const loginBtn = document.getElementById("loginBtn");
      const loginError = document.getElementById("loginError");
      const statusText = document.getElementById("statusText");
      const meText = document.getElementById("meText");
      const msgs = document.getElementById("msgs");
      const imageInput = document.getElementById("imageInput");
      const imageBtn = document.getElementById("imageBtn");
      const msgInput = document.getElementById("msgInput");
      const sendBtn = document.getElementById("sendBtn");

      const supabaseGlobal = window.supabase;
      const sbClient =
        supabaseGlobal && typeof supabaseGlobal.createClient === "function"
          ? supabaseGlobal.createClient(SUPABASE_URL, SUPABASE_KEY)
          : null;

      let me = "";
      let channel = null;
      const seenIds = new Set();
      let oldestTimestamp = null;
      let hasMore = true;
      let isLoadingHistory = false;

      function fmtTime(ts) {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "";
        return d.toLocaleString();
      }

      function setStatus(text) {
        statusText.textContent = text;
      }

      function setError(text) {
        loginError.textContent = text || "";
      }

      function displayMessage(row, isPrepend = false) {
        if (!row || !row.id) return;
        if (seenIds.has(row.id)) return;
        seenIds.add(row.id);

        const item = document.createElement("article");
        item.className = `msg ${row.sender === me ? "mine" : ""}`;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `${row.sender} · ${fmtTime(row.created_at)}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (row.type === "image" && row.image_url) {
          bubble.classList.add("image");
          const img = document.createElement("img");
          img.src = row.image_url;
          img.alt = `${row.sender} 发的图片`;
          img.loading = "lazy";
          bubble.appendChild(img);
        } else {
          bubble.textContent = row.content;
        }

        item.append(meta, bubble);

        if (isPrepend) {
          // Prepend below the loader
          const loader = document.getElementById("historyLoader");
          loader.insertAdjacentElement("afterend", item);
        } else {
          msgs.appendChild(item);
          msgs.scrollTop = msgs.scrollHeight;
        }

        // Track oldest timestamp
        const ts = new Date(row.created_at).getTime();
        if (!oldestTimestamp || ts < oldestTimestamp) {
          oldestTimestamp = ts;
        }
      }

      function appendMessage(row) {
        displayMessage(row, false);
      }

      function resetMessages() {
        seenIds.clear();
        const loader = document.getElementById("historyLoader");
        msgs.innerHTML = "";
        msgs.appendChild(loader);
        oldestTimestamp = null;
        hasMore = true;
        isLoadingHistory = false;
      }

      async function loadRecent() {
        setStatus("正在读取最近100条记录...");
        const { data, error } = await sbClient
          .from(TABLE_NAME)
          .select("id,sender,type,content,image_url,created_at")
          .order("created_at", { ascending: false })
          .limit(100);

        if (error) {
          setStatus("读取历史失败");
          setError(`读取历史失败：${error.message}`);
          return;
        }

        resetMessages();
        if (data.length < 100) hasMore = false;
        data.reverse().forEach(appendMessage);
        setStatus("已连接，实时同步中");
      }

      async function loadHistory() {
        if (isLoadingHistory || !hasMore || !oldestTimestamp) return;

        isLoadingHistory = true;
        const loader = document.getElementById("historyLoader");
        loader.style.display = "block";

        const oldScrollHeight = msgs.scrollHeight;

        const { data, error } = await sbClient
          .from(TABLE_NAME)
          .select("id,sender,type,content,image_url,created_at")
          .lt("created_at", new Date(oldestTimestamp).toISOString())
          .order("created_at", { ascending: false })
          .limit(100);

        loader.style.display = "none";
        isLoadingHistory = false;

        if (error) {
          console.error("加载历史失败:", error);
          return;
        }

        if (!data || data.length === 0) {
          hasMore = false;
          return;
        }

        if (data.length < 100) hasMore = false;

        // Prepend each message (desc order: newest older message first)
        data.forEach((row) => displayMessage(row, true));

        // Restore scroll position
        msgs.scrollTop = msgs.scrollHeight - oldScrollHeight;
      }

      // Add scroll listener for infinite scrolling
      msgs.addEventListener("scroll", () => {
        if (msgs.scrollTop <= 5 && !isLoadingHistory && hasMore) {
          loadHistory();
        }
      });

      async function sendMessage() {
        const content = (msgInput.value || "").trim();
        if (!content) return;
        if (!me) return;

        sendBtn.disabled = true;
        imageBtn.disabled = true;
        const { error } = await sbClient.from(TABLE_NAME).insert({
          sender: me,
          type: "text",
          content,
        });
        sendBtn.disabled = false;
        imageBtn.disabled = false;

        if (error) {
          setStatus("发送失败");
          alert(`发送失败：${error.message}`);
          return;
        }

        msgInput.value = "";
        msgInput.focus();
      }

      async function readImage(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            resolve(img);
          };
          img.onerror = (e) => {
            URL.revokeObjectURL(url);
            reject(e);
          };
          img.src = url;
        });
      }

      async function compressImage(file) {
        const img = await readImage(file);
        const maxSide = 1920;
        const ratio = Math.min(1, maxSide / Math.max(img.width, img.height));
        const width = Math.max(1, Math.round(img.width * ratio));
        const height = Math.max(1, Math.round(img.height * ratio));

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        const outputType = file.type === "image/png" ? "image/png" : "image/jpeg";
        const quality = outputType === "image/jpeg" ? 0.88 : undefined;
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, outputType, quality));
        if (!blob) return file;
        return blob;
      }

      function extByType(type) {
        if (type === "image/png") return "png";
        if (type === "image/webp") return "webp";
        return "jpg";
      }

      async function sendImage(file) {
        if (!file || !me) return;
        if (!file.type || !file.type.startsWith("image/")) {
          alert("请选择图片文件");
          return;
        }

        sendBtn.disabled = true;
        imageBtn.disabled = true;
        setStatus("正在压缩图片...");

        let blob;
        try {
          blob = await compressImage(file);
        } catch (err) {
          sendBtn.disabled = false;
          imageBtn.disabled = false;
          setStatus("图片处理失败");
          alert(`图片处理失败：${err.message || err}`);
          return;
        }

        const type = blob.type || file.type || "image/jpeg";
        const ext = extByType(type);
        const safeDir = ACCOUNT_DIR[me] || "user";
        const path = `${safeDir}/${Date.now()}_${Math.random().toString(36).slice(2, 9)}.${ext}`;

        setStatus("正在上传图片...");
        const { error: uploadErr } = await sbClient.storage.from(IMAGE_BUCKET).upload(path, blob, {
          contentType: type,
          upsert: false,
        });

        if (uploadErr) {
          sendBtn.disabled = false;
          imageBtn.disabled = false;
          setStatus("上传失败");
          alert(`上传失败：${uploadErr.message}`);
          return;
        }

        const { data: urlData } = sbClient.storage.from(IMAGE_BUCKET).getPublicUrl(path);
        const imageUrl = urlData && urlData.publicUrl ? urlData.publicUrl : "";

        const { error: insertErr } = await sbClient.from(TABLE_NAME).insert({
          sender: me,
          type: "image",
          content: "图片",
          image_url: imageUrl,
        });

        sendBtn.disabled = false;
        imageBtn.disabled = false;

        if (insertErr) {
          setStatus("发送失败");
          alert(`发送图片消息失败：${insertErr.message}`);
          return;
        }

        imageInput.value = "";
        setStatus("已连接，实时同步中");
      }

      async function subscribeRealtime() {
        if (channel) {
          await sbClient.removeChannel(channel);
        }

        channel = sbClient
          .channel("chat-room-realtime")
          .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: TABLE_NAME },
            (payload) => {
              appendMessage(payload.new);
              setStatus("已连接，实时同步中");
            }
          );

        channel.subscribe((status) => {
          if (status === "SUBSCRIBED") {
            setStatus("已连接，实时同步中");
          }
          if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
            setStatus("实时连接异常");
          }
        });
      }

      async function doLogin() {
        const account = (accountInput.value || "").trim();
        if (!ALLOWED_ACCOUNTS.has(account)) {
          setError("登录失败：账号只能是“白白”或“飞飞”。");
          return;
        }

        if (!sbClient) {
          setError("登录失败：Supabase SDK 加载失败，请刷新重试。");
          return;
        }

        me = account;
        setError("");
        meText.textContent = me;
        loginPanel.style.display = "none";
        chatPanel.classList.add("show");

        await loadRecent();
        await subscribeRealtime();
      }

      loginBtn.addEventListener("click", doLogin);
      accountInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      sendBtn.addEventListener("click", sendMessage);
      imageBtn.addEventListener("click", () => imageInput.click());
      imageInput.addEventListener("change", () => {
        const file = imageInput.files && imageInput.files[0];
        if (file) sendImage(file);
      });
      msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
